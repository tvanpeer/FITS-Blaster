name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
        run: |
          echo "$CERTIFICATES_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "" build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$CERTIFICATES_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: List schemes
        run: xcodebuild -list -project "FITS Blaster.xcodeproj"

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "FITS Blaster.xcodeproj" \
            -scheme "FITS Blaster" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/FITS Blaster.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            2>&1 | tee /tmp/xcodebuild.log
          exit ${PIPESTATUS[0]}

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/FITS Blaster.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create \
            -volname "FITS Blaster" \
            -srcfolder "$RUNNER_TEMP/export/FITS Blaster.app" \
            -ov -format UDZO \
            "$RUNNER_TEMP/FITS-Blaster-${VERSION}.dmg"
          echo "DMG_PATH=$RUNNER_TEMP/FITS-Blaster-${VERSION}.dmg" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Notarise
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.DEVELOPMENT_TEAM }}" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FITS Blaster ${{ env.VERSION }}"
          body_path: CHANGELOG.md
          files: ${{ env.DMG_PATH }}
