name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
        run: |
          echo "$CERTIFICATES_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "" build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$CERTIFICATES_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: List schemes
        run: xcodebuild -list -project "FITS Blaster.xcodeproj"

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "FITS Blaster.xcodeproj" \
            -scheme "FITS Blaster" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/FITS Blaster.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            2>&1 | tee /tmp/xcodebuild.log
          exit ${PIPESTATUS[0]}

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/FITS Blaster.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Create DMG
        run: |
          brew install create-dmg
          VERSION="${GITHUB_REF_NAME#v}"
          create-dmg \
            --volname "FITS Blaster Installer" \
            --volicon "resources/Book of Galaxies.icns" \
            --background "resources/installer-background.png" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon "FITS Blaster.app" 200 185 \
            --app-drop-link 600 185 \
            "$RUNNER_TEMP/FITS-Blaster-${VERSION}.dmg" \
            "$RUNNER_TEMP/export/FITS Blaster.app"
          echo "DMG_PATH=$RUNNER_TEMP/FITS-Blaster-${VERSION}.dmg" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Notarise
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.DEVELOPMENT_TEAM }}" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FITS Blaster ${{ env.VERSION }}"
          body_path: CHANGELOG.md
          files: ${{ env.DMG_PATH }}

      - name: Update site
        run: python3 scripts/update-site.py "${{ env.VERSION }}"

      - name: Commit and push site updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/tvanpeer/FITS-Blaster.git"
          git add site/index.html site/changelog.html
          git diff --staged --quiet || git commit -m "release: update site for v${{ env.VERSION }} [skip ci]"
          git push origin HEAD:main

      - name: Deploy site to hosting
        env:
          DA_HOST: h58.mijn.host
          DA_USER: ${{ secrets.DA_USER }}
          DA_KEY: ${{ secrets.DA_KEY }}
          DA_DOMAIN: astrophoto-app.com
        run: python3 scripts/deploy-site.py
