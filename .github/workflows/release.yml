name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "FITS Blaster.xcodeproj" \
            -scheme "FITS Blaster" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/FITS Blaster.xcarchive" \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/FITS Blaster.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create \
            -volname "FITS Blaster" \
            -srcfolder "$RUNNER_TEMP/export/FITS Blaster.app" \
            -ov -format UDZO \
            "$RUNNER_TEMP/FITS-Blaster-${VERSION}.dmg"
          echo "DMG_PATH=$RUNNER_TEMP/FITS-Blaster-${VERSION}.dmg" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Notarise
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.DEVELOPMENT_TEAM }}" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FITS Blaster ${{ env.VERSION }}"
          body_path: CHANGELOG.md
          files: ${{ env.DMG_PATH }}
